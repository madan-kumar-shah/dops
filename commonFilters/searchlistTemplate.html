<style>
    .searchListBox{
        display: block;
        position: absolute;
        z-index: 10000;
        max-height: 200px;
        overflow: auto;
        /*padding: 5px 0;*/
        box-shadow: -2px 2px 10px #d2d2d2;
        background: #ffffff;
        color: #232323;
        font-size: 0.9em;
        outline: 1px solid #d2d2d2;
    }
    .searchListBox>ul{
        position: relative;
        width: 100%;
        height: 100%;
        overflow: auto;
        margin: 0;
        padding: 0;
        list-style: none;
    }
    .searchListBox>ul>li{
        position: relative;
        width: 100%;
        margin: auto;
        padding: 5px 0;
        min-height: 15px;
        cursor: pointer;
    }
    .searchListBox>ul>li:not(:last-child){
        border-bottom: 1px solid #d2d2d2;
    }
    .searchListBox>ul>li>label{
        display: inline-block;
        padding: 0 5px;
        cursor: pointer;
        /*color: #666666;*/
    }
    
</style>

<dmsearchlist class="searchListBox"
            ng-style="adjustPosition()"
            ng-if="listObj.listShown">
    <!--ng-if="listObj.listShown"-->
    <ul ng-mouseenter="focusIndex=null">
        <li ng-repeat="item in itemList | orderObjectBy:'value_sequence' track by $index"
            ng-mousedown="itemClick(item)"
            ng-style="hoverItem==$index||focusIndex==$index?getHoverStyle():{'color':'#'+themeColor}"
            ng-mouseover="hoverItem=$index"
            ng-mouseleave="hoverItem=null"
            dm-focus="focusIndex==$index"
            >
            <label>{{item[itemdesc]}}</label> 
        </li>
    </ul>
</dmsearchlist>
